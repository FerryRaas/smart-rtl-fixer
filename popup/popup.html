<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Smart RTL Fixer</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main class="wrap">
    <h1>Smart RTL Fixer</h1>
    <p class="sub">Per-site RTL fixer for mixed Arabic and English text.</p>

    <div class="host-card">
      <div class="label">Current site</div>
      <div id="host" class="host">Loading...</div>
    </div>

    <label class="toggle-card">
      <span>
        <strong>Enable on this site</strong>
        <small>Fixes Arabic alignment and mixed text direction</small>
      </span>
      <input id="enabledToggle" type="checkbox">
    </label>

    <section class="notes">
      <p class="small">Code blocks remain left to right.</p>
    </section>
  </main>
  <script src="popup.js"></script>
</body>
</html>
